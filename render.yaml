services:
  - type: web
    name: worktime
    runtime: node
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: worktime-db
          property: connectionString

databases:
  - name: worktime-db
    databaseName: worktime
    user: worktime_user
    plan: free
